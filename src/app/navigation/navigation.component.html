<nav [ngClass]="isScrolled ? 'nav-scrolled' : 'nav-top'">
  <div class="nav-inner">

    <!-- Logo -->
    <a href="#" class="nav-logo">
      <div class="nav-logo-icon">D</div>
      <span class="nav-logo-text" [ngClass]="isScrolled ? 'text-dark-800' : 'text-white'">
        Dineo<span class="gradient-text">.</span>
      </span>
    </a>

    <!-- Desktop links (lg and up) -->
    <ul class="nav-links">
      <li *ngFor="let item of navItems">
        <a [href]="item.href"
           class="nav-link"
           [ngClass]="{
             'nav-link-light': !isScrolled,
             'nav-link-dark': isScrolled,
             'nav-link-active': activeItem === item.id
           }"
           (click)="setActiveItem(item.id)">
          {{ item.label }}
        </a>
      </li>
    </ul>

    <!-- Desktop CTA -->
    <a href="#contact" class="nav-cta" [ngClass]="isScrolled ? 'nav-cta-dark' : 'nav-cta-light'"
       (click)="setActiveItem('contact')">
      <i class="fas fa-paper-plane"></i> Hire Me
    </a>

    <!-- Mobile hamburger -->
    <button class="nav-hamburger" (click)="toggleMobileMenu()"
            [ngClass]="isScrolled ? 'text-dark-700' : 'text-white'">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path *ngIf="!isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
        <path *ngIf="isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>

  </div>

  <!-- Mobile dropdown -->
  <div class="nav-mobile-menu" [ngClass]="{'nav-mobile-open': isMobileMenuOpen}"
       [style.background]="isScrolled ? 'rgba(255,255,255,0.98)' : 'rgba(15,23,42,0.98)'">
    <a *ngFor="let item of navItems"
       [href]="item.href"
       class="nav-mobile-link"
       [ngClass]="isScrolled ? 'text-dark-700' : 'text-white'"
       (click)="setActiveItem(item.id); toggleMobileMenu()">
      {{ item.label }}
    </a>
    <a href="#contact" class="nav-mobile-cta"
       (click)="setActiveItem('contact'); toggleMobileMenu()">
      <i class="fas fa-paper-plane"></i> Hire Me
    </a>
  </div>
</nav>
